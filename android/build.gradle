group 'com.example.v2ray_flutter'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.example.v2ray_flutter'
    }

    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    defaultConfig {
        minSdk 21
    }

    dependencies {
        // 2026-05-18: api (не implementation) для libs/*.aar — чтобы
        // libv2ray.Libv2ray transitive экспортировался в app-модуль.
        // MainActivity.kt в vpn_native_client напрямую импортирует
        // libv2ray.Libv2ray (см. convertUrlToConfig delegate, MainActivity:481).
        // Без api-экспорта получаем Unresolved reference 'Libv2ray' в
        // app:compileApkDebugKotlin.
        api fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
        implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
        // 2026-05-15: убран хардкод flutter_embedding_release —
        // эта артефакт-версия удалена из Maven. Современный Flutter плагин
        // получает embedding через flutter.gradle автоматически.
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}