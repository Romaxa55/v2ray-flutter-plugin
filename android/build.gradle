group 'com.example.v2ray_flutter'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // 2026-05-21: flatDir для libs/*.aar. AGP 8.1+ запрещает прямые
        // `files('*.aar')` зависимости в library-модулях (см. ошибку
        // hasLocalAarDeps при сборке debug AAR). Подключаем libv2ray.aar
        // через flatDir-repo + `implementation name: 'libv2ray', ext: 'aar'`.
        flatDir {
            dirs "$projectDir/libs"
        }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.example.v2ray_flutter'
    }

    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    defaultConfig {
        minSdk 21
    }

    dependencies {
        // 2026-05-21: AGP 8.1+ запрещает прямые `fileTree(... *.aar)` в
        // library-модулях (см. ошибку hasLocalAarDeps). Заменили на
        // flatDir-repo (см. allprojects.repositories выше) + явный
        // implementation/api по имени.
        //
        // 2026-05-18: api (не implementation) — чтобы libv2ray.Libv2ray
        // transitive экспортировался в app-модуль. MainActivity.kt в
        // vpn_native_client напрямую импортирует libv2ray.Libv2ray (см.
        // convertUrlToConfig delegate, MainActivity:481). Без api-экспорта
        // получаем Unresolved reference 'Libv2ray' в
        // app:compileApkDebugKotlin.
        api(name: 'libv2ray', ext: 'aar')
        implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
        // 2026-05-28 (#20 iOS-parity Observatory bridge): MMKV для чтения
        // snapshot который пишет VpnTunnelService (:vpntunnel процесс).
        // Plugin живёт в UI-процессе, прямой Libv2ray.getObservatoryState
        // вернёт пустоту (xray не запущен в UI после Phase 1.5).
        // 2026-06-03: bump 1.3.9 → 1.3.14 (16 KB page size, см. app/build.gradle).
        // 1.3.x LTS сохраняет armeabi-v7a; 2.x выкинул 32-бит — не брать.
        implementation 'com.tencent:mmkv:1.3.14'
        // 2026-05-15: убран хардкод flutter_embedding_release —
        // эта артефакт-версия удалена из Maven. Современный Flutter плагин
        // получает embedding через flutter.gradle автоматически.
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}